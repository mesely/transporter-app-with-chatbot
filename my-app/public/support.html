<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transport 245 Support</title>
    <style>
      :root { --accent:#0891b2; --text:#0f172a; --muted:#475569; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background:#fff; color:var(--text); }
      .wrap { max-width: 860px; margin: 0 auto; padding: 32px 18px; }
      .top { display:flex; align-items:center; gap:12px; border-bottom:1px solid #e2e8f0; padding-bottom:12px; }
      .top img { width:40px; height:40px; border-radius:12px; object-fit:cover; }
      .brand { font-size:11px; letter-spacing:.16em; text-transform:uppercase; font-weight:800; color:var(--accent); }
      h1 { margin:20px 0 8px; font-size:34px; line-height:1.1; }
      p { margin:0 0 10px; color:var(--muted); font-weight:600; line-height:1.5; }
      .grid { display:grid; gap:10px; margin-top:20px; }
      .item { border-bottom:1px solid #e2e8f0; padding-bottom:10px; }
      .item b { display:block; font-size:12px; text-transform:uppercase; margin-bottom:4px; }
      .links { margin-top:18px; display:flex; gap:8px; flex-wrap:wrap; }
      .btn { text-decoration:none; border:1px solid #dbe5ee; border-radius:10px; padding:9px 12px; font-size:12px; font-weight:800; text-transform:uppercase; color:#0f172a; }
      .btn.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="top">
        <img src="/favicon.png" alt="Transport 245" />
        <div>
          <div class="brand">Transport 245</div>
          <div style="font-size:13px;font-weight:700;color:#334155">Support</div>
        </div>
      </div>

      <h1>Need help?</h1>
      <p>For app issues, technical support, and product feedback, use the channels below.</p>

      <div class="grid">
        <div class="item"><b>Email</b><a href="mailto:iletisimtransporter@gmail.com">iletisimtransporter@gmail.com</a></div>
        <div class="item"><b>Phone</b><span>+90 537 408 10 74</span></div>
        <div class="item"><b>Address</b><span>Tuzla, Istanbul, Turkiye</span></div>
      </div>

      <div class="links">
        <a class="btn primary" href="/support">Support Form</a>
        <a class="btn" href="/privacy">Privacy Policy</a>
      </div>
    </main>
  </body>
</html>
